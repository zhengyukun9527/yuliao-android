name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_notes:
        description: '发布说明（可选）'
        required: false
        default: '常规更新'

env:
  APP_NAME: yuliao
  APP_DISPLAY_NAME: 宇聊

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      version_string: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build }}
      apk_name: ${{ steps.version.outputs.apk_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 计算版本号
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0"
          fi
          BUILD="${{ github.run_number }}"
          # versionCode 数字：主*10000 + 次*100 + 修
          IFS='.' read -r MA MI PA <<< "$VERSION"
          VCODE=$(( ${MA:-1}*10000 + ${MI:-0}*100 + ${PA:-0} ))
          APK_NAME="${APP_NAME}-v${VERSION}.apk"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "vcode=$VCODE" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "📦 版本: $VERSION (build $BUILD, versionCode $VCODE)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install npm dependencies (with JPush fallback)
        run: |
          set +e
          npm install
          if [ $? -ne 0 ]; then
            for pkg in "@jiguang-ionic/capacitor-jpush" "jpush-capacitor-plugin" "@jpush-plugin/capacitor-jpush"; do
              npm pkg delete "dependencies.@jpush-plugin/capacitor-jpush" 2>/dev/null || true
              npm pkg delete "dependencies.@jiguang-ionic/capacitor-jpush" 2>/dev/null || true
              npm pkg delete "dependencies.jpush-capacitor-plugin" 2>/dev/null || true
              npm install "$pkg" --save && break
            done
          fi
          set -e

      - name: Add Android platform
        run: |
          npx cap add android || echo "Platform already added"

      - name: Configure AndroidManifest & XML resources
        run: |
          [ -f scripts/AndroidManifest.xml ] && cp scripts/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          [ -f scripts/strings.xml ] && cp scripts/strings.xml android/app/src/main/res/values/strings.xml
          mkdir -p android/app/src/main/res/xml
          [ -f scripts/network_security_config.xml ] && cp scripts/network_security_config.xml android/app/src/main/res/xml/network_security_config.xml
          [ -f scripts/file_paths.xml ] && cp scripts/file_paths.xml android/app/src/main/res/xml/file_paths.xml
          echo "✅ 资源就绪"

      - name: Inject JPush AppKey into AndroidManifest (可选)
        env:
          JPUSH_APPKEY: ${{ secrets.JPUSH_APPKEY }}
          JPUSH_CHANNEL: ${{ secrets.JPUSH_CHANNEL || 'developer-default' }}
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -z "$JPUSH_APPKEY" ]; then
            echo "⏭  未设置 secrets.JPUSH_APPKEY，跳过 JPush 注入（无 JPush 集成也能编译）"
            exit 0
          fi
          python3 <<PYEOF
          p = "$MANIFEST"
          with open(p, 'r', encoding='utf-8') as f: m = f.read()
          block = '''
              <meta-data android:name="JPUSH_APPKEY" android:value="$JPUSH_APPKEY" />
              <meta-data android:name="JPUSH_CHANNEL" android:value="$JPUSH_CHANNEL" />
          '''
          if 'JPUSH_APPKEY' not in m:
              m = m.replace('</application>', block + '\n    </application>', 1)
              with open(p, 'w', encoding='utf-8') as f: f.write(m)
          PYEOF

      - name: Sync Capacitor plugins to Android
        run: npx cap sync android

      - name: 写入 versionName / versionCode
        run: |
          GRADLE=android/app/build.gradle
          VERSION="${{ steps.version.outputs.version }}"
          VCODE="${{ steps.version.outputs.vcode }}"
          # sed 匹配 versionCode 1 / versionName "1.0"
          sed -i "s/versionCode [0-9]\+/versionCode $VCODE/" "$GRADLE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" "$GRADLE"
          echo "═══ 版本信息 ═══"
          grep -E "versionCode|versionName" "$GRADLE"

      - name: Decode release keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "❌ 缺 secrets.ANDROID_KEYSTORE_B64 - 存量用户无法覆盖安装！"
            exit 1
          fi
          echo "$KS_B64" | base64 -d > android/app/yuliao-release.jks
          ls -la android/app/yuliao-release.jks

      - name: 注入 signing config 到 build.gradle
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          GRADLE=android/app/build.gradle
          # 在 android { 块开头插入 signingConfigs（若尚未存在）
          if ! grep -q "signingConfigs" "$GRADLE"; then
            python3 <<PYEOF
          import re
          p = "$GRADLE"
          with open(p, "r", encoding="utf-8") as f:
              g = f.read()
          block = """    signingConfigs {
                  release {
                      storeFile file('yuliao-release.jks')
                      storePassword System.getenv('KS_PASS')
                      keyAlias System.getenv('KEY_ALIAS')
                      keyPassword System.getenv('KEY_PASS')
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          """
              # 在 android { 之后插入
              g = re.sub(r'(android\s*\{)', r'\1\n' + block, g, count=1)
              with open(p, "w", encoding="utf-8") as f:
                  f.write(g)
          PYEOF
          fi
          echo "═══ signing block ═══"
          grep -A 6 "signingConfigs" "$GRADLE" | head -20

      - name: Build Release APK (signed)
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: 验证签名指纹（确保是 yuliao release keystore）
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK"
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs "$APK" | grep -E "SHA-1|Signer" | head -4

      - name: Rename APK
        run: |
          APK_PATH="$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)"
          test -f "$APK_PATH" || { echo "❌ APK 未找到"; find android/app/build/outputs -name "*.apk"; exit 1; }
          mkdir -p artifacts
          cp "$APK_PATH" "artifacts/${{ steps.version.outputs.apk_name }}"
          ls -lh artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-android-apk-v${{ steps.version.outputs.version }}
          path: artifacts/${{ steps.version.outputs.apk_name }}
          retention-days: 90

      - name: 创建 GitHub Release (仅在 tag 触发时)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/${{ steps.version.outputs.apk_name }}
          name: 宇聊 Android v${{ steps.version.outputs.version }}
          body: |
            ## 🎉 宇聊 Android v${{ steps.version.outputs.version }}

            **构建号**：build ${{ steps.version.outputs.build }}
            **versionCode**：${{ steps.version.outputs.vcode }}
            **发布说明**：${{ github.event.inputs.release_notes || github.event.head_commit.message || '常规更新' }}

            ### 📥 安装方式
            服务端已配置代理下载，用户从 chat.qjyes.com/downloads/apk 或 APP 内更新弹窗自动获取本 APK。
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          {
            echo "## 🎉 宇聊 Android APK 构建成功"
            echo ""
            echo "| 项 | 值 |"
            echo "|---|---|"
            echo "| versionName | ${{ steps.version.outputs.version }} |"
            echo "| versionCode | ${{ steps.version.outputs.vcode }} |"
            echo "| APK 名称 | ${{ steps.version.outputs.apk_name }} |"
            echo "| 大小 | $(du -h artifacts/${{ steps.version.outputs.apk_name }} | cut -f1) |"
          } >> $GITHUB_STEP_SUMMARY
